databases:
  - name: p2p-lending-db
    plan: free

services:
  - type: web
    name: p2p-lending-api
    runtime: node
    plan: free
    healthCheckPath: /health
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: p2p-lending-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URLS
        sync: false
